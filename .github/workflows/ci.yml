name: Verify MetroPulse Lakehouse

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: End-to-end verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Install Python package
        run: python -m pip install -e ".[dev]"

      - name: Run end-to-end verification
        run: bash scripts/verify.sh
        env:
          METROPULSE_VERIFY_ROOT: ${{ runner.temp }}/metropulse-verify
          PYTHON_BIN: python

      - name: Build and validate Python distributions
        run: |
          python -m pip install "build>=1.2,<2" "twine>=6,<7"
          python -m build
          python -m twine check dist/*

      - name: Smoke-test the installed wheel
        run: |
          python -m venv "${RUNNER_TEMP}/metropulse-wheel"
          "${RUNNER_TEMP}/metropulse-wheel/bin/python" -m pip install dist/*.whl
          "${RUNNER_TEMP}/metropulse-wheel/bin/python" -m pip check
          "${RUNNER_TEMP}/metropulse-wheel/bin/metropulse" run \
            --project-root "${RUNNER_TEMP}/metropulse-wheel-smoke" \
            --days 3 \
            --seed 20260713 \
            --as-of 2026-07-12

  python-compatibility:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Python package
        run: python -m pip install -e ".[dev]"

      - name: Run Python tests
        run: python -m pytest -q
